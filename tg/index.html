<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inner Circle | GrowShal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }

        /* Initial state hidden to prevent flicker */
        #return-ui { display: none; text-align: center; padding: 20px; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .circle-glow {
            width: 80px; height: 80px; background: #7000ff; border-radius: 50%;
            margin: 0 auto 25px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(112, 0, 255, 0.4);
            font-size: 30px;
        }

        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        .re-enter-btn {
            background: #fff; color: #000; text-decoration: none;
            padding: 16px 32px; border-radius: 14px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .re-enter-btn:active { transform: scale(0.92); }

        /* Luxury Gradient Background */
        .gradient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1a1a, #000);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>

    <div id="return-ui">
        <div class="circle-glow">
            <i class="fab fa-telegram-plane"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Seems like you're already a member of Growshal</p>
        
        <a href="tg://resolve?domain=BH2kxF53R0I1YzJl" class="re-enter-btn">
            RE-ENTER CHANNEL <i class="fas fa-arrow-right"></i>
        </a>
    </div>

    <script>
        (function() {
            const storageKey = "gs_inner_circle_member";
            const tgAppUrl = "https://t.me/+BH2kxF53R0I1YzJl";
            const tgWebUrl = "https://t.me/+BH2kxF53R0I1YzJl";

            // Check if user has visited before
            const hasVisited = localStorage.getItem(storageKey);

            if (!hasVisited) {
                // --- 1st TIME USER LOGIC ---
                // Set the flag immediately
                localStorage.setItem(storageKey, "true");
                
                // Redirect immediately (no UI shown)
                window.location.href = tgAppUrl;

                // Fallback for browser
                setTimeout(() => {
                    window.location.href = tgWebUrl;
                }, 500);

            } else {
                // --- 2nd TIME USER LOGIC ---
                // Show the Return UI
                document.getElementById('return-ui').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
