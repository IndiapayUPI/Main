<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrowShal | Secure Redirect</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle at center, #7000ff15 0%, transparent 50%);
            animation: pulse-bg 4s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes pulse-bg {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 1; }
        }

        .container {
            text-align: center;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: fadeInZoom 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInZoom {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Loader Section */
        .loader-wrapper {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 30px;
        }

        .loader-circle {
            position: absolute; inset: 0;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .loader-active {
            position: absolute; inset: -2px;
            border: 2px solid transparent;
            border-top-color: #7000ff;
            border-right-color: #00e5ff;
            border-radius: 50%;
            animation: rotate 1.5s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .tg-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px; color: #fff;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.5));
            transition: 0.5s;
        }

        /* UI Text */
        #main-title {
            font-size: 1.2rem; font-weight: 600; letter-spacing: 1px;
            margin-bottom: 10px; transition: 0.5s;
        }

        #sub-text { font-size: 0.85rem; color: #666; font-weight: 300; transition: 0.5s; }

        /* Progress Bar */
        .progress-container {
            width: 180px; height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; margin: 25px auto;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #7000ff, #00e5ff);
            animation: loadProgress 5s linear forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .status-badge {
            display: inline-block; padding: 6px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px;
            color: #00e5ff; margin-top: 10px; transition: 0.4s;
        }

        /* Retry Button - Hidden by default */
        .retry-btn {
            display: none;
            margin-top: 25px;
            padding: 15px 30px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.9rem;
            animation: fadeInUp 0.5s forwards;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Error State Colors */
        .error-state { color: #ff3366 !important; }
        .error-bar { background: #ff3366 !important; }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="loader-wrapper">
            <div class="loader-circle"></div>
            <div id="loader-ring" class="loader-active"></div>
            <i id="center-icon" class="fab fa-telegram-plane tg-icon"></i>
        </div>

        <h1 id="main-title">CONNECTING</h1>
        <p id="sub-text">Syncing with GrowShal HQ...</p>

        <div class="progress-container">
            <div id="p-bar" class="progress-bar"></div>
        </div>

        <div class="status-badge" id="status">Encrypting...</div>

        <a href="https://t.me/growshal" class="retry-btn" id="retry">
            Plz Click ( CONTINUE ) 
        </a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const mainTitle = document.getElementById('main-title');
            const subText = document.getElementById('sub-text');
            const statusBadge = document.getElementById('status');
            const progressBar = document.getElementById('p-bar');
            const loaderRing = document.getElementById('loader-ring');
            const centerIcon = document.getElementById('center-icon');
            const retryBtn = document.getElementById('retry');
            
            const telegramAppURL = "tg://resolve?domain=growshal";
            const telegramWebURL = "tg://resolve?domain=growshal";

            // Sequence Timeline
            setTimeout(() => { statusBadge.innerText = "Verified"; statusBadge.style.color = "#fff"; }, 1200);
            setTimeout(() => { statusBadge.innerText = "Launching App"; statusBadge.style.color = "#00e5ff"; }, 2500);

            // 1. Initial Attempt to open App
            setTimeout(() => {
                window.location.href = telegramAppURL;
            }, 2000);

            // 2. Logic for Failure (If after 5s still on page)
            setTimeout(() => {
                // Change UI to Error State
                mainTitle.innerText = "FAILED TO OPEN";
                mainTitle.classList.add('error-state');
                
                subText.innerText = "Telegram app not detected via growshal.";
                statusBadge.innerText = "plz Don't Click [ Go Back ] ";
                statusBadge.style.borderColor = "#ff3366";
                
                progressBar.classList.add('error-bar');
                loaderRing.style.borderTopColor = "#ff3366";
                centerIcon.style.color = "#ff3366";
                centerIcon.classList.replace('fa-telegram-plane', 'fa-exclamation-triangle');
                
                // Show Retry Button
                retryBtn.style.display = "inline-block";
            }, 5500);
        });
    </script>
</body>
</html>
