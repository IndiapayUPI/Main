<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniquezone</title>
    <!-- Tailwind CSS included for structural elements, custom CSS handles the lux aesthetic -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 
         --- LUXURY THEME ---
        */
        :root {
            --bg-deep-charcoal: #0a0a0c;
            --gold-accent: #f59e0b;
            --gold-subtle: rgba(245, 158, 11, 0.6);
            --luxury-text: #eaeaea;
            --subtle-text: rgba(234, 234, 234, 0.7);
            --transition-ease: cubic-bezier(0.65, 0, 0.35, 1); /* Custom smooth ease */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-deep-charcoal);
            font-family: 'Georgia', serif; /* Use a sophisticated font */
            -webkit-font-smoothing: antialiased;
        }

        /* Fullscreen Site Iframe with app-like behavior */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.03); /* Start slightly larger for entry */
            transition: opacity 1s var(--transition-ease), transform 1.2s var(--transition-ease);
        }

        /* 
         --- LOADER CONTAINER (SPLASH) ---
        */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Luxurious dark gradient with texture */
            background: 
                radial-gradient(circle at 50% 50%, rgba(30, 30, 35, 0.4) 0%, rgba(10, 10, 12, 1) 100%),
                url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43 0c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 37c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57 13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM58 82c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM43 9c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm0 31c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zM78 15c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zm10 24c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zm0 51c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zM53 77c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zM24 62c4.97 0 9-4.03 9-9s-4.03-9-9-9-9 4.03-9 9 4.03 9 9 9zm18-4c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z" fill="%23f59e0b" fill-opacity="0.03" fill-rule="evenodd"/%3E%3C/svg%3E');
            z-index: 9999;
            transition: opacity 0.8s var(--transition-ease), transform 0.8s var(--transition-ease), background-color 0.8s var(--transition-ease);
        }

        /* 
         --- LOGO ANIMATION (BRUSHED GOLD) ---
        */
        .brand-logo-wrapper {
            position: relative;
            margin-bottom: 3.5rem;
            perspective: 1000px; /* Enable 3D perspective */
        }

        .brand-logo {
            width: 140px;
            height: auto;
            opacity: 0;
            transform: scale(0.9) rotateY(15deg);
            filter: grayscale(1) brightness(0.9); /* Initially muted */
            animation: 
                logoReveal 1.2s forwards var(--transition-ease),
                logoFloat 5s infinite ease-in-out 1.2s;
        }

        /* Entrance animation for the logo */
        @keyframes logoReveal {
            to {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
                filter: grayscale(0) brightness(1) drop-shadow(0 0 15px var(--gold-subtle));
            }
        }

        /* Subtle, slow floating 'suspended in space' motion */
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotateY(0deg); }
            50% { transform: translateY(-8px) rotateY(3deg); }
        }

        /* 
         --- COMPLEX ORBIT LOADING SPINNER ---
        */
        .luxury-spinner {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto;
        }

        .luxury-spinner::before,
        .luxury-spinner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--gold-accent);
            animation: spinOrbit 1.5s linear infinite;
        }

        .luxury-spinner::after {
            border-top-color: transparent;
            border-bottom-color: var(--gold-accent);
            animation-duration: 2.5s;
            animation-delay: 0.2s;
        }

        /* The central dot */
        .luxury-spinner-core {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background-color: var(--gold-accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--gold-accent);
            animation: pulseCore 2s ease-in-out infinite;
        }

        /* Complex orbital rotation */
        @keyframes spinOrbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pulsing core */
        @keyframes pulseCore {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        /* 
         --- PREMIUM TYPOGRAPHY ---
        */
        .lux-text-wrapper {
            margin-top: 1.5rem;
            text-align: center;
        }

        .lux-heading {
            color: var(--luxury-text);
            font-weight: 300; /* Light weight for sophistication */
            font-size: 1.25rem; /* text-lg */
            letter-spacing: 0.15em; /* Spacing for a premium feel */
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(10px);
            animation: textReveal 1s forwards ease-out 1.5s;
        }

        .lux-subtext {
            color: var(--subtle-text);
            font-weight: 300;
            font-size: 0.875rem; /* text-sm */
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
            font-style: italic;
            opacity: 0;
            animation: textReveal 1s forwards ease-out 1.8s;
        }

        /* Reveal animation for the text */
        @keyframes textReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Splash / Luxury Loader Screen -->
    <div id="loader-container">
        <!-- Suspended & Floating Brand Logo -->
        <div class="brand-logo-wrapper">
            <img src="https://growshal.com/wp-content/uploads/2023/12/cropped-admin-ajax2.png" alt="Growshal Logo" class="brand-logo">
        </div>
        
        <!-- Complex 'Orbit' Loading Animation -->
        <div class="luxury-spinner">
            <div class="luxury-spinner-core"></div>
        </div>

        <!-- Sophisticated Typography -->
        <div class="lux-text-wrapper px-4">
            <h2 class="lux-heading">Connecting to DARK WEB</h2>
            <p class="lux-subtext">
                World's safe browsing with no tracking...
            </p>
        </div>
    </div>

    <!-- 
      Fullscreen Site Iframe with app-like behavior.
      sandbox forces internal navigation for links, ensuring they load *within* the app.
    -->
    <iframe 
        id="site-frame" 
        src="https://learn.uniquezone.io" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
        allow="geolocation; microphone; camera; midi; encrypted-media; gyroscope; accelerometer; clipboard-write">
    </iframe>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loader = document.getElementById('loader-container');
            const iframe = document.getElementById('site-frame');

            // 3 seconds delay for the full luxury sequence to complete
            setTimeout(function() {
                // Phase 1: Loader container fades and moves slightly up
                loader.style.opacity = '0';
                loader.style.transform = 'translateY(-20px) scale(1.02)';
                loader.style.backgroundColor = 'transparent'; // Fades gradient texture
                
                // Phase 2: Site iframe slides in softly
                iframe.style.opacity = '1';
                iframe.style.transform = 'scale(1)';

                // Remove loader from DOM completely after fade out completes
                setTimeout(function() {
                    loader.remove();
                }, 800); // Wait for the main fade out to finish
            }, 3000);
        });
    </script>
</body>
</html>
