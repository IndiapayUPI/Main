<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniquezone</title>
    <!-- Tailwind CSS for the loading UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .brand-logo {
            width: 120px;
            height: auto;
            margin-bottom: 2rem;
            opacity: 0;
            transform: scale(0.8);
            animation: fadeInScale 0.6s forwards ease-out;
        }
        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- Splash / Loader Screen -->
    <div id="loader-container">
        <!-- Growshal Brand Logo -->
        <img src="https://growshal.com/wp-content/uploads/2023/12/cropped-admin-ajax2.png" alt="Growshal Logo" class="brand-logo">
        
        <!-- Requested Loading Animation -->
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-dashed rounded-full animate-spin border-yellow-500 mx-auto"></div>
            <h2 class="text-zinc-900 dark:text-white mt-4 font-semibold text-lg">Connecting to server...</h2>
            <p class="text-zinc-600 dark:text-zinc-400 text-sm mt-1">
                World's safe browsing with no tracking...
            </p>
        </div>
    </div>

    <!-- Fullscreen Site Iframe -->
    <iframe id="site-frame" src="https://learn.uniquezone.io" allow="geolocation; microphone; camera; midi; encrypted-media; gyroscope; accelerometer; clipboard-write"></iframe>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loader = document.getElementById('loader-container');
            const iframe = document.getElementById('site-frame');

            // 2.5 seconds delay before revealing the website
            setTimeout(function() {
                // Smooth fade out for the loader
                loader.style.opacity = '0';
                
                // Show the iframe
                iframe.style.display = 'block';

                // Remove loader from DOM completely after fade out completes
                setTimeout(function() {
                    loader.remove();
                }, 500);
            }, 2500);
        });
    </script>
</body>
</html>
