<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniquezone Secure Shell</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #040406;
            font-family: sans-serif;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.01);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0b10 0%, #020204 100%);
            z-index: 9999;
            transition: all 0.5s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .ui-loader {
            width: 410px; /* थोड़ा चौड़ा किया ताकि सारा मैट्रिक्स डेटा फिट आ सके */
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(8, 9, 15, 0.75);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), 0 0 40px rgba(110, 231, 255, 0.02);
            overflow: hidden;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: relative;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .term-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0));
        }
        .term-bar .dot {
            width: 11px;
            height: 11px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.3);
            transition: background 0.3s;
        }
        .ui-loader.done .term-bar .dot:nth-child(1) { background: #ff5f56; }
        .ui-loader.done .term-bar .dot:nth-child(2) { background: #ffbd2e; }
        .ui-loader.done .term-bar .dot:nth-child(3) { background: #27c93f; }

        .term-title {
            margin-left: auto;
            font: 700 10px/1 ui-sans-serif, system-ui;
            color: #6ee7ff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .term-body {
            padding: 18px 18px 20px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 11.5px;
            line-height: 1.6;
        }

        .line {
            margin: 6px 0;
            display: none;
            align-items: center;
            justify-content: space-between; /* डेटा को लेफ्ट-राइट अलाइन करने के लिए */
        }
        .line.visible { display: flex; }
        .line b { color: #6ee7ff; }
        .muted { color: rgba(255, 255, 255, 0.45); }
        .neon-amber { color: #fbbf24; }
        .neon-purple { color: #c084fc; }

        .tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            height: 18px;
            border-radius: 5px;
            margin-right: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            font-weight: 800;
            font-size: 9px;
        }
        .tag.ok { color: #51ffb8; border-color: rgba(81, 255, 184, 0.2); }
        .tag.run { color: #b08cff; border-color: rgba(176, 140, 255, 0.2); }
        .tag.warn { color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 12px;
            margin-left: 4px;
            background: #b08cff;
            box-shadow: 0 0 10px #b08cff;
            animation: blink 0.8s steps(2, end) infinite;
        }

        .progress {
            margin-top: 16px;
            height: 6px;
            border-radius: 999px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }
        .progress.visible { display: block; }

        .fill {
            position: absolute;
            inset: 0 100% 0 0;
            background: linear-gradient(90deg, #6ee7ff, #b08cff);
            transition: right 0.15s ease-out;
        }
        
        .glint {
            position: absolute;
            inset: -30% -40%;
            background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.15) 25%, transparent 45%);
            animation: glintMove 1.5s linear infinite;
            mix-blend-mode: screen;
        }

        @keyframes glintMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="loader-container">
        <div class="ui-loader" id="hacker-terminal" role="status" aria-label="Loading">
            <div class="term-bar">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <div class="term-title">ONION_ROUTER_V4.SH</div>
            </div>

            <div class="term-body">
                <div class="line" id="line1">
                    <span><b>$</b> tor --bridge uniquezone.io</span>
                    <span class="muted">[INIT]</span>
                </div>
                <div class="line muted" id="line2">
                    <span>› pinging nearest relays...</span>
                    <span class="neon-amber" id="real-ping">checking ping...</span>
                </div>
                <div class="line" id="line3">
                    <span><span class="tag ok">OK</span> tunneling to dark web layer</span>
                    <span class="neon-purple">node_active</span>
                </div>
                <div class="line" id="line4">
                    <span><span class="tag run">PROXY</span> syncing deep_dom (<span id="byte-counter">0kb</span>)</span>
                    <span><span id="speed-indicator">0.0 Mbps</span><span class="cursor" id="term-cursor" aria-hidden="true"></span></span>
                </div>

                <div class="progress" id="term-progress">
                    <div class="fill" id="progress-fill"></div>
                    <div class="glint" aria-hidden="true"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 
  Connected to web ... safe browsing now
    -->
    <iframe 
        id="site-frame" 
        src="https://learn.uniquezone.io" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"
        allow="geolocation; microphone; camera; midi; encrypted-media; gyroscope; accelerometer; clipboard-write">
    </iframe>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loaderContainer = document.getElementById('loader-container');
            const terminal = document.getElementById('hacker-terminal');
            const iframe = document.getElementById('site-frame');
            
            const l1 = document.getElementById('line1');
            const l2 = document.getElementById('line2');
            const l3 = document.getElementById('line3');
            const l4 = document.getElementById('line4');
            const progress = document.getElementById('term-progress');
            const fill = document.getElementById('progress-fill');
            const cursor = document.getElementById('term-cursor');
            
            const realPingText = document.getElementById('real-ping');
            const byteCounter = document.getElementById('byte-counter');
            const speedIndicator = document.getElementById('speed-indicator');

            let currentProgress = 0;
            let iframeLoaded = false;
            let totalBytes = Math.floor(Math.random() * (1600 - 950 + 1)) + 950; 

            // --- 1. असली इंटरनेट स्पीड और लेटेंसी (MS) डिटेक्शन ---
            let pingStart = performance.now();
            
            // हम एक हल्की सी इमेज या फाइल रिक्वेस्ट भेजकर असली पिंग टाइम (ms) कैलकुलेट करते हैं
            fetch('https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=10', { mode: 'no-cors', cache: 'no-store' })
            .then(() => {
                let pingDuration = Math.round(performance.now() - pingStart);
                realPingText.textContent = pingDuration + 'ms (Tor Active)';
                
                // असली पिंग के आधार पर दिखावटी नेटवर्क स्पीड सेट करना
                let mbps = (1000 / pingDuration * 5).toFixed(1);
                speedIndicator.textContent = mbps + ' Mbps';
            })
            .catch(() => {
                // ऑफलाइन या ब्लॉक होने की स्थिति में रैंडम सेफ फॉलबैक (ताकि एरर न दिखे)
                realPingText.textContent = Math.floor(Math.random() * (95 - 45 + 1) + 45) + 'ms (Tor Active)';
                speedIndicator.textContent = (Math.random() * (45 - 12) + 12).toFixed(1) + ' Mbps';
            });

            // --- 2. सीक्वेंशियल डार्क वेब बूट सीक्वेंस ---
            setTimeout(() => l1.classList.add('visible'), 250);
            setTimeout(() => l2.classList.add('visible'), 650);
            setTimeout(() => l3.classList.add('visible'), 1450);

            setTimeout(() => {
                l4.classList.add('visible');
                progress.classList.add('visible');
                startDynamicLoading();
            }, 1950);

            // --- 3. रियल-टाइम लोड मॉनिटरिंग सिस्टम ---
            function startDynamicLoading() {
                let cpuCores = navigator.hardwareConcurrency ? Math.min(navigator.hardwareConcurrency, 8) : 4;
                
                let progressInterval = setInterval(() => {
                    if (!iframeLoaded) {
                        // जब तक बैकएंड पर डोमेन पूरी तरह से कनेक्ट और लोड नहीं हो जाता, 88% पर रोकें
                        if (currentProgress < 88) {
                            currentProgress += Math.random() * (cpuCores / 2.2);
                            if (currentProgress > 88) currentProgress = 88;
                        }
                    } else {
                        // जैसे ही असली लोड फिनिश सिग्नल मिले, बार को तुरंत 100% पर पुश करें
                        currentProgress += Math.random() * 18 + 7;
                        if (currentProgress >= 100) {
                            currentProgress = 100;
                            clearInterval(progressInterval);
                            finishHackerSequence();
                        }
                    }

                    fill.style.right = (100 - currentProgress) + '%';
                    byteCounter.textContent = Math.floor((currentProgress / 100) * totalBytes) + 'kb';
                }, 90);
            }

            // --- 4. IFRAME का असली लोड लिसनर ---
            iframe.addEventListener('load', function() {
                iframeLoaded = true;
            });

            // सेफ्टी ओवरराइड: अगर यूजर का नेट बहुत स्लो हो, तो 8.5 सेकंड में फोर्स-ओपन करें
            setTimeout(() => {
                iframeLoaded = true;
            }, 8500);

            // --- 5. क्लोजिंग एनीमेशन ---
            function finishHackerSequence() {
                setTimeout(() => {
                    terminal.classList.add('done');
                    if (cursor) cursor.remove();
                    
                    loaderContainer.style.opacity = '0';
                    loaderContainer.style.transform = 'scale(0.96) translateY(-10px)';
                    
                    iframe.style.opacity = '1';
                    iframe.style.transform = 'scale(1)';

                    setTimeout(() => {
                        loaderContainer.remove();
                    }, 500);
                }, 500);
            }

 

            window.onbeforeunload = function() {
         
                return "Navigation is locked inside the secure container.";
            };
        });
    </script>
</body>
</html>
