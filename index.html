<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniquezone</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: sans-serif;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.01);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0c0d14 0%, #040406 100%);
            z-index: 9999;
            transition: all 0.5s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .ui-loader {
            width: 380px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(10, 11, 18, 0.6);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(110, 231, 255, 0.02);
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .term-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
        }
        .term-bar .dot {
            width: 11px;
            height: 11px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.3);
            transition: background 0.3s;
        }
        .ui-loader.done .term-bar .dot:nth-child(1) { background: #ff5f56; }
        .ui-loader.done .term-bar .dot:nth-child(2) { background: #ffbd2e; }
        .ui-loader.done .term-bar .dot:nth-child(3) { background: #27c93f; }

        .term-title {
            margin-left: auto;
            font: 700 11px/1 ui-sans-serif, system-ui;
            color: rgba(110, 231, 255, 0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .term-body {
            padding: 18px 18px 20px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 12px;
            line-height: 1.6;
        }

        .line {
            margin: 6px 0;
            display: none; /* JS इसे लाइन-बाय-लाइन ट्रिगर करेगा */
            align-items: center;
        }
        .line.visible { display: flex; }
        .line b { color: #6ee7ff; }
        .muted { color: rgba(255, 255, 255, 0.45); }

        .tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            height: 18px;
            border-radius: 5px;
            margin-right: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            font-weight: 800;
            font-size: 10px;
        }
        .tag.ok { color: #51ffb8; border-color: rgba(81, 255, 184, 0.2); }
        .tag.run { color: #b08cff; border-color: rgba(176, 140, 255, 0.2); }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 13px;
            margin-left: 6px;
            background: #b08cff;
            box-shadow: 0 0 10px #b08cff;
            animation: blink 0.8s steps(2, end) infinite;
        }

        .progress {
            margin-top: 16px;
            height: 6px;
            border-radius: 999px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: none;
        }
        .progress.visible { display: block; }

        .fill {
            position: absolute;
            inset: 0 100% 0 0; /* JS से इसकी विड्थ कंट्रोल होगी */
            background: linear-gradient(90deg, #6ee7ff, #b08cff);
            transition: right 0.1s ease-out; /* रियल स्मूथ इंक्रीमेंट */
        }
        
        .glint {
            position: absolute;
            inset: -30% -40%;
            background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.2) 25%, transparent 45%);
            animation: glintMove 1.5s linear infinite;
            mix-blend-mode: screen;
        }

        @keyframes glintMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="loader-container">
        <div class="ui-loader" id="hacker-terminal" role="status" aria-label="Loading">
            <div class="term-bar">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <div class="term-title">SECURE_CONNECT.SH</div>
            </div>

            <div class="term-body">
                <div class="line" id="line1"><b>$</b> uniquezone --connect</div>
                <div class="line muted" id="line2">› initializing handshake [<span id="ms-timer">0ms</span>]...</div>
                <div class="line" id="line3"><span class="tag ok">OK</span> tunnel secured via async_proxy</div>
                <div class="line" id="line4">
                    <span class="tag run">FETCH</span> pulling secure_dom (<span id="byte-counter">0kb</span>)
                    <span class="cursor" id="term-cursor" aria-hidden="true"></span>
                </div>

                <div class="progress" id="term-progress">
                    <div class="fill" id="progress-fill"></div>
                    <div class="glint" aria-hidden="true"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Fullscreen Site Iframe -->
    <iframe 
        id="site-frame" 
        src="https://google.com" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
        allow="geolocation; microphone; camera; midi; encrypted-media; gyroscope; accelerometer; clipboard-write">
    </iframe>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loaderContainer = document.getElementById('loader-container');
            const terminal = document.getElementById('hacker-terminal');
            const iframe = document.getElementById('site-frame');
            
            const l1 = document.getElementById('line1');
            const l2 = document.getElementById('line2');
            const l3 = document.getElementById('line3');
            const l4 = document.getElementById('line4');
            const progress = document.getElementById('term-progress');
            const fill = document.getElementById('progress-fill');
            const cursor = document.getElementById('term-cursor');
            
            const msTimer = document.getElementById('ms-timer');
            const byteCounter = document.getElementById('byte-counter');

            let currentProgress = 0;
            let iframeLoaded = false;
            let targetBytes = Math.floor(Math.random() * (1400 - 900 + 1)) + 900; // हर बार अलग बाइट साइज (900kb - 1400kb)

            // 1. लाइव टाइमर एनीमेशन (असली जैसा दिखाने के लिए रैंडम स्पीड)
            let start = performance.now();
            let timerInterval = setInterval(() => {
                let diff = Math.floor(performance.now() - start);
                msTimer.textContent = diff + 'ms';
            }, 40);

            // 2. सीक्वेंशियल शेल बूट
            setTimeout(() => l1.classList.add('visible'), 200);
            setTimeout(() => l2.classList.add('visible'), 600);
            
            setTimeout(() => {
                clearInterval(timerInterval); // टाइमर लॉक करें
                l3.classList.add('visible');
            }, 1300);

            setTimeout(() => {
                l4.classList.add('visible');
                progress.classList.add('visible');
                startRealLoading();
            }, 1800);

            // 3. असली नेटवर्क डिपेंडेंट प्रोग्रेस लॉजिक
            function startRealLoading() {
                // डिवाइस की परफॉरमेंस चेक करना (Slower CPU = Slower base speed)
                let hardwareAnticipation = navigator.hardwareConcurrency ? Math.min(navigator.hardwareConcurrency, 8) : 4;
                
                let progressInterval = setInterval(() => {
                    if (!iframeLoaded) {
                        // जब तक iframe लोड नहीं होता, तब तक धीरे-धीरे प्रोग्रेस बढ़ाएं (Fake strictly dependent growth)
                        // 85% पर जाकर यह तब तक होल्ड करेगा जब तक असली नेटवर्क सिग्नल नहीं मिलता
                        if (currentProgress < 85) {
                            currentProgress += Math.random() * (hardwareAnticipation / 2);
                            if (currentProgress > 85) currentProgress = 85;
                        }
                    } else {
                        // जैसे ही iframe लोड सिग्नल्स आएं, तेजी से 100% कर दें
                        currentProgress += Math.random() * 15 + 5;
                        if (currentProgress >= 100) {
                            currentProgress = 100;
                            clearInterval(progressInterval);
                            endLoadingSequence();
                        }
                    }

                    // प्रोग्रेस बार अपडेट करना (CSS right property का उपयोग)
                    fill.style.right = (100 - currentProgress) + '%';
                    
                    // बाइट काउंटर को रियल-टाइम बढ़ाना
                    let currentBytes = Math.floor((currentProgress / 100) * targetBytes);
                    byteCounter.textContent = currentBytes + 'kb';

                }, 80 + (Math.random() * 50)); // रैंडम रिफ्रेश रेट ताकि प्रोग्रेस झटका न लगे
            }

            // 4. IFRAME का असली लोड लिसनर
            iframe.addEventListener('load', function() {
                iframeLoaded = true;
            });

            // बैकअप सेफ्टी: अगर किसी कारणवश इंटरनेट बहुत ही घटिया हो या लोड इवेंट ब्लॉक हो, तो 8 सेकंड में खुद रिलीज हो जाए
            setTimeout(() => {
                iframeLoaded = true;
            }, 8000);

            // 5. क्लोजिंग एंड एग्जिट
            function endLoadingSequence() {
                setTimeout(() => {
                    terminal.classList.add('done');
                    if(cursor) cursor.remove();
                    
                    // आउट्रो ट्रांजिशन
                    loaderContainer.style.opacity = '0';
                    loaderContainer.style.transform = 'scale(0.97)';
                    
                    iframe.style.opacity = '1';
                    iframe.style.transform = 'scale(1)';

                    setTimeout(() => {
                        loaderContainer.remove();
                    }, 500);
                }, 400);
            }
        });
    </script>
</body>
</html>
