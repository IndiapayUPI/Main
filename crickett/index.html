<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarman Bhai - Cricket Predictions</title>
    <style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background:linear-gradient(135deg,#87CEEB,#1E90FF);color:#fff;min-height:100vh}.container{max-width:500px;margin:0 auto;padding:20px}.header{text-align:center;padding:30px 0 20px}.profile-container{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}.profile-image{width:130px;height:130px;border-radius:50%;object-fit:cover;border:3px solid #fff;margin-bottom:20px;box-shadow:0 4px 8px rgba(0,0,0,0.2)}.profile-name{font-size:1.8rem;font-weight:bold;margin-bottom:15px}.btn{display:block;background:#fff;color:#1E90FF;text-decoration:none;font-weight:bold;border-radius:25px;padding:15px;margin:10px 0;text-align:center;width:100%;border:2px solid #fff;font-size:1.1rem}.mobile-header-btn{display:none}.features{padding:25px 0}.section-title{text-align:center;font-size:1.4rem;margin-bottom:20px}.feature-list{list-style:none;max-width:300px;margin:0 auto}.feature-item{padding:0px 0;color:#fff;font-size:1rem;text-align:center}.feature-item:before{content:"✓";color:#fff;font-weight:bold;margin-right:8px}.cta-section{text-align:center;padding:25px 0;margin:20px 0}.cta-title{font-size:1.4rem;margin-bottom:10px}.cta-text{color:#fff;margin-bottom:15px;font-size:1rem}.advertiser{color:#fff;font-size:0.9rem;margin-top:10px}.advertiser a{color:#fff;text-decoration:none;font-weight:bold}.mobile-buttons{position:fixed;bottom:0;left:0;width:100%;background:#1E90FF;padding:12px;display:none}@media (max-width:768px){.desktop-btn{display:none}.mobile-header-btn{display:block;margin-top:10px}.mobile-buttons{display:block}}@media (min-width:769px){.mobile-buttons{display:none}.desktop-btn{display:block}}</style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="profile-container">
                <img id="profileImage" src="https://d1yei2z3i6k35z.cloudfront.net/13184094/690e3b8f1acee_6079888166316870820.jpg" alt="Profile" class="profile-image">
                <h1 id="profileName" class="profile-name">Aarman Bhai</h1>
                <a id="desktopHeaderBtn" href="https://t.me/quicklygrow" class="btn desktop-btn">Join Free Telegram</a>
                <a id="mobileHeaderBtn" href="https://t.me/quicklygrow" class="btn mobile-header-btn">Join Free Telegram</a>
            </div>
        </header>
        <section class="features">
            <h2 class="section-title">Cricket Predictions</h2>
            <ul class="feature-list">
                <li class="feature-item">Expert Match Analysis</li>
                <li class="feature-item">Accurate Predictions</li>
                <li class="feature-item">Free Daily Tips</li>
            </ul>
        </section>
        <section class="cta-section">
            <h2 class="cta-title">Join Now</h2>
            <p class="cta-text">Get free cricket predictions daily</p>
            <div class="advertiser">
                ⇓ Click the Button Below & Join Now ⇓
            </div>
            <a id="desktopCtaBtn" href="https://t.me/quicklygrow" class="btn desktop-btn">Join Telegram Channel</a>
        </section>
    </div>
    <div class="mobile-buttons">
        <a id="mobileStickyBtn" href="https://t.me/quicklygrow" class="btn">Join Free Telegram</a>
    </div>

    <script>
        (function() {
            const DP_IMAGES = [
                "",
                "https://sportsdp.com/blog/wp-content/uploads/2025/09/cricket-dp-1.jpg",
                "https://img.magnific.com/premium-photo/cricket-ball-bat_1037680-44301.jpg",
                "https://avatars.githubusercontent.com/u/25204160?v=4",
                "https://inod.site/buy_nod32/wp-content/uploads/2024/12/telgrampng.parspng.com-12-300x300-1.png",
                "https://cdn.dribbble.com/userupload/31247542/file/original-6bffca75489b498ac197da299a340baa.gif",
                "https://media.tenor.com/qBmfmGXOIcsAAAAj/utya-utya-duck.gif",
                "https://cdn-icons-gif.flaticon.com/11919/11919493.gif",
                "https://static.vecteezy.com/system/resources/previews/031/557/862/non_2x/hide-icon-vector.jpg",
                "https://media.tenor.com/rihVeMBZWjcAAAAM/utya-utya-duck.gif"
            ];

            function extractUsername(link) {
                if (!link) return '';
                let cleanLink = link.trim();
                if (cleanLink.startsWith('https://t.me/')) {
                    return cleanLink.substring('https://t.me/'.length).split('/')[0].split('?')[0];
                }
                if (cleanLink.startsWith('t.me/')) {
                    return cleanLink.substring('t.me/'.length).split('/')[0].split('?')[0];
                }
                if (cleanLink.startsWith('@')) {
                    return cleanLink.substring(1);
                }
                return cleanLink;
            }

            function applyRoutingAndData() {
                const hash = window.location.hash;
                
                if (!hash || hash === '#' || hash.length <= 1) {
                    window.location.href = "/create-cricket";
                    return;
                }

                const parts = hash.substring(1).split('#');
                
                if (parts.length < 4) {
                    window.location.href = "/error";
                    return;
                }

                const rawTelegramLink = parts[0] || '';
                const rawChannelName = parts[1] || '';
                const dpCodeStr = parts[2] || '';
                const pixelId = parts[3] || '';

                if (!rawTelegramLink || !rawChannelName || !dpCodeStr || !pixelId) {
                    window.location.href = "/error";
                    return;
                }

                const dpCode = parseInt(dpCodeStr, 10);
                if (isNaN(dpCode) || dpCode < 1 || dpCode > 9) {
                    window.location.href = "/error";
                    return;
                }

                const username = extractUsername(rawTelegramLink);
                if (!username) {
                    window.location.href = "/error";
                    return;
                }

                let channelName;
                try {
                    channelName = decodeURIComponent(rawChannelName);
                } catch (e) {
                    channelName = rawChannelName;
                }

                const telegramUrl = `https://t.me/${username}`;
                const dpImageUrl = DP_IMAGES[dpCode];

                document.getElementById('profileImage').src = dpImageUrl;
                document.getElementById('profileImage').alt = channelName;
                document.getElementById('profileName').textContent = channelName;

                const telegramLinks = [
                    document.getElementById('desktopHeaderBtn'),
                    document.getElementById('mobileHeaderBtn'),
                    document.getElementById('desktopCtaBtn'),
                    document.getElementById('mobileStickyBtn')
                ];

                telegramLinks.forEach(link => {
                    if (link) {
                        link.href = telegramUrl;
                    }
                });

                if (pixelId && window.fbq) {
                    window.fbq('init', pixelId);
                    window.fbq('track', 'PageView');
                } else if (pixelId) {
                    !function(f,b,e,v,n,t,s)
                    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
                    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
                    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
                    n.queue=[];t=b.createElement(e);t.async=!0;
                    t.src=v;s=b.getElementsByTagName(e)[0];
                    s.parentNode.insertBefore(t,s)}(window, document,'script',
                    'https://connect.facebook.net/en_US/fbevents.js');
                    fbq('init', pixelId);
                    fbq('track', 'PageView');
                }
            }

            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                applyRoutingAndData();
            } else {
                window.addEventListener('DOMContentLoaded', applyRoutingAndData);
            }
        })();
    </script>
</body>
</html>
