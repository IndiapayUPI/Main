<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Generate Billing Link</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* Admin side dark theme for contrast */
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 {
            color: #2980b9;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #2ecc71;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid #27ae60;
            border-radius: 4px;
            word-break: break-all;
        }
        .hidden {
            display: none;
        }
        .link-output a {
            color: #d35400;
            font-weight: bold;
            text-decoration: none;
        }
        .link-output a:hover {
            text-decoration: underline;
        }
        .copy-btn {
            margin-top: 10px;
            background-color: #3498db;
            padding: 8px;
            font-size: 14px;
        }
        .copy-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin: Create Billing Link</h2>
    
    <div class="form-group">
        <label for="payerName">Client / Payer Name:</label>
        <input type="text" id="payerName" placeholder="e.g., Zain">
    </div>
    
    <div class="form-group">
        <label for="billingAmount">Billing Amount (INR):</label>
        <input type="number" id="billingAmount" placeholder="e.g., 10000">
    </div>
    
    <button onclick="generateLink()">Generate Link</button>

    <div id="resultArea" class="result-box hidden">
        <strong>Share this link with client:</strong><br><br>
        <div id="generatedLinkText" class="link-output"></div>
        <button class="copy-btn" onclick="copyToClipboard()">Copy Link</button>
    </div>
</div>

<script>
    function generateLink() {
        const name = document.getElementById('payerName').value.trim();
        const amount = document.getElementById('billingAmount').value.trim();

        if (!name || !amount) {
            alert("Please enter both Name and Amount!");
            return;
        }

        // 1. Data ko URL standard format mein set karna
        const rawData = `name=${encodeURIComponent(name)}&amt=${encodeURIComponent(amount)}`;
        
        // 2. Base64 Encode karna (btoa)
        const encodedData = btoa(rawData);

        // 3. Viewer page ka URL banana (assuming admin.html aur viewer.html same folder mein hain)
        // Yeh current path lega aur 'admin.html' ko hata kar 'viewer.html' laga dega
        let currentPath = window.location.href;
        let baseUrl = currentPath.substring(0, currentPath.lastIndexOf('GST') ;
        
        // 4. Final Link create karna
        const finalLink = `${baseUrl}?data=${encodedData}`;

        // UI par update karna
        document.getElementById('generatedLinkText').innerHTML = `<a href="${finalLink}" target="_blank" id="finalUrl">${finalLink}</a>`;
        document.getElementById('resultArea').classList.remove('hidden');
    }

    function copyToClipboard() {
        const linkText = document.getElementById('finalUrl').href;
        navigator.clipboard.writeText(linkText).then(() => {
            alert("Link copied to clipboard!");
        }).catch(err => {
            console.error('Failed to copy: ', err);
        });
    }
</script>

</body>
</html>
