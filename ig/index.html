<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram | @growshal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: #fff; color: #262626; }

        /* Header / Nav */
        .header {
            position: sticky; top: 0; background: #fff;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; border-bottom: 1px solid #dbdbdb; z-index: 100;
        }
        .header i { font-size: 22px; }
        .username-top { font-weight: 700; font-size: 1.1rem; }

        /* Profile Section */
        .profile-container { padding: 16px; }

        .profile-main { display: flex; align-items: center; margin-bottom: 15px; }

        .dp-side { width: 30%; position: relative; }
        .dp-ring {
            width: 86px; height: 86px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-radius: 50%; padding: 3px; display: flex; align-items: center; justify-content: center;
        }
        .dp-inner { 
            width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; 
            overflow: hidden; background: #eee;
        }
        .dp-inner img { width: 100%; height: 100%; object-fit: cover; }

        .stats-side {
            width: 70%; display: flex; justify-content: space-around; text-align: center;
        }
        .stat-num { font-weight: 700; font-size: 1rem; display: block; }
        .stat-label { font-size: 0.85rem; color: #262626; }

        /* Bio Section */
        .bio-section { padding: 0 16px 15px; font-size: 0.92rem; line-height: 1.4; }
        .full-name { font-weight: 700; display: block; }
        .category { color: #8e8e8e; display: block; }
        .bio-link { color: #00376b; text-decoration: none; font-weight: 600; display: block; margin-top: 5px; }

        /* Action Buttons */
        .btn-group { display: flex; gap: 8px; padding: 0 16px 20px; }
        .action-btn {
            flex: 1; height: 32px; border-radius: 8px; border: none;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-follow { background-color: #0095f6; color: white; }
        .btn-msg { background-color: #efefef; color: #262626; }
        .action-btn:active { opacity: 0.7; transform: scale(0.98); }

        /* Grid Section (Placeholder for 501 posts) */
        .grid-header {
            display: flex; border-top: 1px solid #dbdbdb; justify-content: space-around;
            padding: 12px 0; color: #8e8e8e;
        }
        .grid-header i { color: #0095f6; font-size: 20px; }

        .posts-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
        }
        .post-box { background: #fafafa; aspect-ratio: 1/1; }
        .post-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left"></i>
        <div class="username-top">growshal <i class="fas fa-certificate" style="color:#0095f6; font-size:12px;"></i></div>
        <i class="fas fa-ellipsis-h"></i>
    </div>

    <div class="profile-container">
        <div class="profile-main">
            <div class="dp-side">
                <div class="dp-ring">
                    <div class="dp-inner">
                        <img src="69e52eab293598.28181895_272097054_158393586528151_7962930046251568437_n.jpg" alt="Growshal DP">
                    </div>
                </div>
            </div>
            <div class="stats-side">
                <div><span class="stat-num">501</span><span class="stat-label">posts</span></div>
                <div><span class="stat-num">80.2K</span><span class="stat-label">followers</span></div>
                <div><span class="stat-num">67</span><span class="stat-label">following</span></div>
            </div>
        </div>
    </div>

    <div class="bio-section">
        <span class="full-name">GrowShal | Content Creation & Marketing Agency</span>
        <span class="category">Advertising/marketing</span>
        <p>For Smart Business Owners & Marketers 💡<br>
        Secrets of Marketing & Business hacks 💸<br>
        #marketing #business #startup</p>
        <a href="https://mobile-app.influish.com/@growshal" class="bio-link">
            <i class="fas fa-link" style="font-size: 10px; color: #00376b;"></i> mobile-app.influish.com @growshal
        </a>
    </div>

    <div class="btn-group">
        <a href="instagram://user?username=growshal" class="action-btn btn-follow" id="followBtn">Follow</a>
        <a href="instagram://direct_share?username=growshal" class="action-btn btn-msg">Message</a>
    </div>

    <div class="grid-header">
        <i class="fas fa-th"></i>
        <i class="fas fa-play-circle" style="color:#8e8e8e"></i>
        <i class="fas fa-user-tag" style="color:#8e8e8e"></i>
    </div>

    <div class="posts-grid">
        <div class="post-box"><img src="https://picsum.photos/400/400?random=1"></div>
        <div class="post-box"><img src="https://picsum.photos/400/400?random=2"></div>
        <div class="post-box"><img src="https://picsum.photos/400/400?random=3"></div>
        <div class="post-box"><img src="https://picsum.photos/400/400?random=4"></div>
        <div class="post-box"><img src="https://picsum.photos/400/400?random=5"></div>
        <div class="post-box"><img src="https://picsum.photos/400/400?random=6"></div>
    </div>

    <script>
        // Smooth Click Logic
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                // We let the 'href' handle the app opening via instagram:// protocol
                console.log("Attempting to open Instagram App...");
            });
        });
    </script>

</body>
</html>
