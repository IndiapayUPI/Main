<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram | @growshal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: #fff; color: #262626; display: flex; justify-content: center; }

        /* Mobile Wrapper */
        .app-shell { width: 100%; max-width: 480px; min-height: 100vh; background: #fff; }

        /* Header */
        .header {
            position: sticky; top: 0; background: #fff;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-bottom: 1px solid #efefef; z-index: 100;
        }
        .header i { font-size: 20px; color: #262626; }
        .username-top { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 4px; }

        /* Profile Section */
        .profile-container { padding: 20px 16px 10px; }

        .profile-main { display: flex; align-items: center; margin-bottom: 18px; }

        .dp-side { width: 85px; margin-right: 28px; }
        .dp-ring {
            width: 82px; height: 82px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-radius: 50%; padding: 2.5px; display: flex; align-items: center; justify-content: center;
        }
        .dp-inner { 
            width: 100%; height: 100%; border-radius: 50%; border: 2.5px solid #fff; 
            overflow: hidden; background: #eee;
        }
        .dp-inner img { width: 100%; height: 100%; object-fit: cover; }

        .stats-side {
            flex: 1; display: flex; justify-content: space-between; text-align: center;
        }
        .stat-num { font-weight: 700; font-size: 1.05rem; display: block; }
        .stat-label { font-size: 0.85rem; color: #262626; font-weight: 400; }

        /* Bio Section */
        .bio-section { padding: 0 16px 20px; font-size: 0.9rem; line-height: 1.45; }
        .full-name { font-weight: 600; display: block; margin-bottom: 2px; }
        .category { color: #8e8e8e; display: block; margin-bottom: 2px; }
        .bio-text { color: #262626; }
        .bio-link { color: #00376b; text-decoration: none; font-weight: 600; display: block; margin-top: 8px; }

        /* Action Buttons */
        .btn-group { display: flex; gap: 6px; padding: 0 16px 20px; }
        .action-btn {
            flex: 1; height: 32px; border-radius: 8px; border: none;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
            transition: all 0.2s;
        }
        .btn-follow { background-color: #0095f6; color: white; }
        .btn-msg { background-color: #efefef; color: #262626; }
        
        /* Fade-Zoom Animation on Click */
        .action-btn:active { transform: scale(0.96); opacity: 0.8; }

        /* Bottom Spacing to look like app */
        .footer-line { border-top: 1px solid #efefef; margin-top: 20px; }

    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <i class="fas fa-chevron-left"></i>
            <div class="username-top">
                growshal 
                <i class="fas fa-certifiate" style="color:#0095f6; font-size:11px;"></i>
            </div>
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <div class="profile-container">
            <div class="profile-main">
                <div class="dp-side">
                    <div class="dp-ring">
                        <div class="dp-inner">
                            <img src="https://d1yei2z3i6k35z.cloudfront.net/13184094/69e52eab293598.28181895_272097054_158393586528151_7962930046251568437_n.jpg" alt="Growshal">
                        </div>
                    </div>
                </div>
                <div class="stats-side">
                    <div><span class="stat-num">⇎</span><span class="stat-label">Error</span></div>
                    <div><span class="stat-num">80.2K</span><span class="stat-label">followers</span></div>
                    <div><span class="stat-num">67</span><span class="stat-label">following</span></div>
                </div>
            </div>
        </div>

        <div class="bio-section">
            <span class="full-name">GrowShal | Content Creation & Marketing Agency</span>
            <span class="category">Advertising/marketing</span>
            <div class="bio-text">
                For Smart Business Owners & Marketers 💡<br>
                Secrets of Marketing & Business hacks 💸<br>
                #marketing #business #startup
            </div>
            <a href="https://mobile-app.influish.com/@growshal" class="bio-link">
                <i class="fas fa-link" style="font-size: 10px;"></i> mobile-app.influish.com @growshal
            </a>
        </div>

        <div class="btn-group">
            <a href="instagram://user?username=growshal" class="action-btn btn-follow">Follow</a>
            <a href="instagram://direct_share?username=growshal" class="action-btn btn-msg">Message</a>
        </div>

        <div class="footer-line"></div>
    </div>

    <script>
        // Simple trigger to ensure app opening feel
        document.querySelector('.btn-follow').addEventListener('click', function() {
            // Logic to track click can go here
            console.log("Redirecting to Instagram App...");
        });
    </script>

</body>
</html>
