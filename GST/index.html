<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Billing Receipt</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .invoice-card {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 6px solid #2980b9;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 24px;
        }
        .header p {
            color: #7f8c8d;
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        .client-info {
            background: #ecf0f1;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 15px;
        }
        .client-info strong {
            color: #2c3e50;
        }
        .billing-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        .billing-table td {
            padding: 10px 0;
            border-bottom: 1px solid #f2f2f2;
            font-size: 15px;
        }
        .billing-table td:last-child {
            text-align: right;
            font-weight: 500;
        }
        .billing-table .total-row td {
            border-top: 2px dashed #bdc3c7;
            border-bottom: none;
            font-size: 18px;
            font-weight: bold;
            color: #27ae60;
            padding-top: 15px;
        }
        .pay-btn {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .pay-btn:hover {
            background-color: #3498db;
        }
        .error-box {
            color: #c0392b;
            background: #fdebd0;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="invoice-card">
    <div id="errorState" class="error-box hidden">
        Invalid or missing billing data link. Please verify with the administrator.
    </div>

    <div id="invoiceContent">
        <div class="header">
            <h2>Tax Invoice Summary</h2>
            <p>GST Compliant Billing Breakdown</p>
        </div>

        <div class="client-info">
            Payer / Client: <strong id="displayClientName">--</strong>
        </div>

        <table class="billing-table">
            <tr>
                <td>Base Amount</td>
                <td id="displayBaseAmt">₹0.00</td>
            </tr>
            <tr>
                <td>CGST (9%)</td>
                <td id="displayCGST">₹0.00</td>
            </tr>
            <tr>
                <td>SGST (9%)</td>
                <td id="displaySGST">₹0.00</td>
            </tr>
            <tr class="total-row">
                <td>Total Payable</td>
                <td id="displayTotal">₹0.00</td>
            </tr>
        </table>

        <button class="pay-btn" onclick="proceedToPayment()">Proceed to Pay</button>
    </div>
</div>

<script>
    window.onload = function() {
        try {
            // 1. URL search params parse karna (?data=...)
            const urlParams = new URLSearchParams(window.location.search);
            const encodedData = urlParams.get('data');

            if (!encodedData) {
                throw new Error("Missing encrypted data payload.");
            }

            // 2. Base64 String decoding (atob)
            const decodedString = atob(encodedData);
            
            // 3. String elements breakdown process (name=Zain&amt=10000)
            const params = new URLSearchParams(decodedString);
            const name = params.get('name');
            const amount = parseFloat(params.get('amt'));

            if (!name || isNaN(amount)) {
                throw new Error("Invalid payload structure.");
            }

            // 4. GST Math Breakdown Calculations
            // Assuming your input amount is the BASE amount
            const cgst = amount * 0.09;
            const sgst = amount * 0.09;
            const totalPayable = amount + cgst + sgst;

            // 5. DOM rendering values to screen
            document.getElementById('displayClientName').innerText = name;
            document.getElementById('displayBaseAmt').innerText = `₹${amount.toFixed(2)}`;
            document.getElementById('displayCGST').innerText = `₹${cgst.toFixed(2)}`;
            document.getElementById('displaySGST').innerText = `₹${sgst.toFixed(2)}`;
            document.getElementById('displayTotal').innerText = `₹${totalPayable.toFixed(2)}`;

        } catch (error) {
            console.error("Decoding error:", error);
            // Show error block & hide receipt structure
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('invoiceContent').classList.add('hidden');
        }
    };

    function proceedToPayment() {
        alert("Redirecting securely to payment gateway integration...");
    }
</script>

</body>
</html>
