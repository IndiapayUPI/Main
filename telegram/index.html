<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrowShal | Luxury Advertising/Marketing</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #7000ff;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.08);
            --text: #1a1a1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Luxury Nebula Background */
        .nebula-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.08) 0%, transparent 40%);
            animation: nebula-float 20s ease-in-out infinite alternate;
        }
        @keyframes nebula-float {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* Top Nav Refined */
        .top-nav {
            position: fixed; top: 0; width: 100%; height: 65px; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            max-width: 480px; left: 50%; transform: translateX(-50%);
        }
        .nav-brand { display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: -0.5px; font-size: 1rem; }
        .nav-logo { height: 28px; }

        /* Nav DM Button - Fade Zoom Anim */
        .nav-dm-btn {
            background: #000; color: #fff; text-decoration: none; padding: 8px 16px; 
            border-radius: 12px; font-size: 0.8rem; font-weight: 600;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .nav-dm-btn:active { transform: scale(0.9) opacity(0.8); }

        .app-container { max-width: 480px; margin: 0 auto; padding: 100px 20px 120px; }

        /* Main Card - Laser Border */
        .card-frame {
            position: relative; border-radius: 30px; padding: 1.5px;
            background: linear-gradient(135deg, #00d2ff, #9d50bb, #00d2ff);
            background-size: 200% 200%;
            animation: border-flow 4s linear infinite;
            margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        @keyframes border-flow { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }
        
        .card-inner { background: white; border-radius: 28px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }

        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 10px 0; }
        .metric-box { border-left: 2px solid #00e5ff; padding-left: 12px; }
        .metric-label { font-size: 0.65rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        .metric-value { font-size: 1.2rem; font-weight: 600; }

        /* Fade-Zoom Animation for all Major Buttons */
        .btn-animate {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            will-change: transform, opacity;
        }
        .btn-animate:hover { transform: scale(1.02); }
        .btn-animate:active { transform: scale(0.95); opacity: 0.9; }

        /* Killer Telegram Button */
        .tg-link {
            text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #000; color: #fff; padding: 18px; border-radius: 18px;
            font-weight: 600; letter-spacing: 1px; font-size: 0.9rem;
            position: relative; overflow: hidden;
        }
        .tg-link::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 200%; } }

        /* Image Grids */
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; font-weight: 800; text-align: center; }
        .grid-16-9 { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .img-box { width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/9; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .grid-9-16 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .img-box-v { aspect-ratio: 9/16; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        .img-box-v img { width: 100%; height: 100%; object-fit: cover; }

        /* Floating Bottom Bar */
        .floating-cta-wrapper {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px);
            width: 90%; max-width: 400px; z-index: 2000;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .floating-cta-wrapper.active { transform: translateX(-50%) translateY(0); }

        .pay-btn {
            display: flex; align-items: center; padding: 18px 20px; border-radius: 22px;
            background: #000; color: #fff; text-decoration: none; font-weight: 700;
            font-size: 1rem; box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .pay-icon-box {
            width: 45px; height: 45px; background: #222; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; margin-right: 15px;
        }

        .socials { display: flex; justify-content: center; gap: 25px; margin-top: 40px; }
        .socials a { color: #888; font-size: 1.4rem; transition: 0.3s; }
        .socials a:hover { color: var(--accent); }

    </style>
</head>
<body>

    <div class="nebula-bg"></div>

    <nav class="top-nav">
        <div class="nav-brand">
            <img src="https://growshal.com/wp-content/uploads/2023/12/cropped-admin-ajax2.png" class="nav-logo" alt="Logo">
            <span>GROWSHAL</span>
        </div>
        <a href="/dm" class="nav-dm-btn btn-animate">Chat With Us</a>
    </nav>

    <div class="app-container">
        
        <div class="card-frame">
            <div class="card-inner">
                <span style="font-size: 0.6rem; letter-spacing: 4px; color: #7000ff; font-weight: 700;">Verified Agency</span>
                <h1 style="font-size: 2rem; font-weight: 300;">Hey I'am <b>Growshal</b></h1>
                
                <div class="metrics">
                    <div class="metric-box">
                        <span class="metric-label">Cost Per Member</span>
                        <div class="metric-value">Max 25₹</div>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Quality</span>
                        <div class="metric-value">100%</div>
                    </div>
                </div>

                <a href="/tg" class="tg-link btn-animate">
                    <i class="fab fa-telegram-plane"></i> JOIN TELEGRAM CHANNEL
                </a>
            </div>
        </div>

        <h3 class="section-title">Latest Results</h3>
        <div class="grid-16-9">
            <div class="img-box"><img src="/16_9/1.png" alt="1"></div>
            <div class="img-box"><img src="/16_9/2.png" alt="2"></div>
            <div class="img-box"><img src="/16_9/3.png" alt="3"></div>
        </div>

        <h3 class="section-title">Clint's Results</h3>
        <div class="grid-9-16">
            <div class="img-box-v"><img src="/9_16/1.jpg" alt="1"></div>
            <div class="img-box-v"><img src="/9_16/2.jpg" alt="2"></div>
            <div class="img-box-v"><img src="/9_16/3.jpg" alt="3"></div>
            <div class="img-box-v"><img src="/9_16/4.jpg" alt="4"></div>
        </div>

        <div class="socials">
            <a href="/ig"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="/dm"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <div class="floating-cta-wrapper" id="scrollCta">
        <a href="/ap" class="pay-btn btn-animate">
            <div class="pay-icon-box">
                <i class="fas fa-bolt" style="color: hwb(226 0% 0%);"></i>
            </div>
            Active Plan At ₹17,999 Only
        </a>
    </div>

    <script>
        let isScrolling;
        const scrollCta = document.getElementById('scrollCta');

        window.addEventListener('scroll', function () {
            // Show bar on scroll
            scrollCta.classList.add('active');

            // Reset timeout
            window.clearTimeout(isScrolling);

            // Hide after 4 seconds of inactivity
            isScrolling = setTimeout(function() {
                scrollCta.classList.remove('active');
            }, 4000);
        }, false);
    </script>

</body>
</html>
<div id="insta-quick" style="position:fixed; top:20px; left:20px; z-index:9999; display:none;">
    <a href="instagram://user?username=growshal">
        <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/instagram-follow.png" 
             style="width:110px; height:auto; image-rendering:-webkit-optimize-contrast; image-rendering:crisp-edges;" 
             alt="Follow">
    </a>
</div>

<script>
    // Direct logic: No animation, pure speed.
    setTimeout(() => {
        const el = document.getElementById('insta-quick');
        el.style.display = 'block'; // 6s par show
        
        setTimeout(() => {
            el.remove(); // 12s par delete
        }, 6000); // 6s show hone ke baad (6+6=12)
    }, 6000);
</script>
