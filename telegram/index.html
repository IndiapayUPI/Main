<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrowShal | Luxury Marketing</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #7000ff;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.08);
            --text: #1a1a1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Luxury Nebula Background */
        .nebula-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.08) 0%, transparent 40%);
            animation: nebula-float 20s ease-in-out infinite alternate;
        }
        @keyframes nebula-float {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* Top Nav - High Gloss */
        .top-nav {
            position: fixed; top: 0; width: 100%; height: 65px; z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px;
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: -0.5px; font-size: 1.1rem; }
        .nav-logo { height: 30px; }

        .app-container { max-width: 480px; margin: 0 auto; padding: 100px 20px 120px; }

        /* Laser Border Card Style */
        .card-frame {
            position: relative; border-radius: 30px; padding: 2px;
            background: linear-gradient(135deg, #00d2ff, #9d50bb);
            margin-bottom: 30px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .card-inner {
            background: white; border-radius: 28px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Metrics Grid */
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 10px 0; }
        .metric-box { border-left: 2px solid #00e5ff; padding-left: 12px; }
        .metric-label { font-size: 0.65rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        .metric-value { font-size: 1.2rem; font-weight: 600; }

        /* Image Grids */
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; font-weight: 800; }
        .grid-16-9 { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .img-box { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--border); aspect-ratio: 16/9; background: #eee;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .grid-9-16 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .img-box-v { aspect-ratio: 9/16; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); background: #eee; }
        .img-box-v img { width: 100%; height: 100%; object-fit: cover; }

        /* Killer Telegram Button */
        .tg-link {
            text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #000; color: #fff; padding: 18px; border-radius: 18px;
            font-weight: 600; letter-spacing: 1px; font-size: 0.9rem;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .tg-link::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg); transition: 0.5s;
        }
        .tg-link:hover::after { left: 150%; }

        /* Floating Bottom Bar */
        .floating-cta-wrapper {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px);
            width: 90%; max-width: 400px; z-index: 2000;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .floating-cta-wrapper.active { transform: translateX(-50%) translateY(0); }

        /* Continue Application Button Style */
        .continue-application {
            --background: #000;
            width: 100%; border: none; outline: none; cursor: pointer;
            position: relative; border-radius: 20px; font-size: 15px; font-weight: 600;
            padding: 20px 20px 20px 70px; color: #fff; background: var(--background);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .continue-application div {
            top: 0; left: 0; bottom: 0; width: 60px; position: absolute;
            background: #222; border-radius: 20px 0 0 20px; display: flex; align-items: center; justify-content: center;
        }

        /* LinkedIn & Socials */
        .socials { display: flex; justify-content: center; gap: 25px; margin-top: 40px; }
        .socials a { color: #888; font-size: 1.4rem; transition: 0.3s; }
        .socials a:hover { color: var(--accent); }

    </style>
</head>
<body>

    <div class="nebula-bg"></div>

    <nav class="top-nav">
        <div class="nav-brand">
            <img src="https://growshal.com/wp-content/uploads/2023/12/cropped-admin-ajax2.png" class="nav-logo" alt="Logo">
            <span>GROWSHAL</span>
        </div>
    </nav>

    <div class="app-container">
        
        <div class="card-frame">
            <div class="card-inner">
                <span style="font-size: 0.6rem; letter-spacing: 4px; color: #7000ff; font-weight: 700;">STRATEGY SYSTEM v2.0</span>
                <h1 style="font-size: 2rem; font-weight: 300;">Grow <b>Business</b></h1>
                
                <div class="metrics">
                    <div class="metric-box">
                        <span class="metric-label">Retention</span>
                        <div class="metric-value">94.2%</div>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Conversion</span>
                        <div class="metric-value">+280%</div>
                    </div>
                </div>

                <a href="#" class="tg-link">
                    <i class="fab fa-telegram-plane"></i> JOIN THE INNER CIRCLE
                </a>
            </div>
        </div>

        <h3 class="section-title">Visual Assets</h3>
        <div class="grid-16-9">
            <div class="img-box"><img src="/16_9/1.png" alt="1"></div>
            <div class="img-box"><img src="/16_9/2.png" alt="2"></div>
            <div class="img-box"><img src="/16_9/3.png" alt="3"></div>
        </div>

        <h3 class="section-title">Campaigns</h3>
        <div class="grid-9-16">
            <div class="img-box-v"><img src="/9_16/1.jpg" alt="1"></div>
            <div class="img-box-v"><img src="/9_16/2.jpg" alt="2"></div>
            <div class="img-box-v"><img src="/9_16/3.jpg" alt="3"></div>
            <div class="img-box-v"><img src="/9_16/4.jpg" alt="4"></div>
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <div class="floating-cta-wrapper" id="scrollCta">
        <button class="continue-application">
            <div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            Active Your Luxury Plan
        </button>
    </div>

    <script>
        let isScrolling;
        const scrollCta = document.getElementById('scrollCta');

        window.addEventListener('scroll', function (event) {
            // 1. Scroll hone par bar dikhao
            scrollCta.classList.add('active');

            // 2. Clear any existing timeout
            window.clearTimeout(isScrolling);

            // 3. 4 seconds tak agar scroll nahi hua to hide kardo
            isScrolling = setTimeout(function() {
                scrollCta.classList.remove('active');
            }, 4000);

        }, false);
    </script>

</body>
</html>
